spring:
  datasource:
    url: jdbc:h2:mem:pawcarehub-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    show-sql: false

server:
  port: 0

security:
  jwt:
    secret: pawcarehub-test-jwt-secret-key-for-integration-tests-2026
    expiration-ms: 86400000

demo:
  seed:
    enabled: false
